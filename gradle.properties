# Habilita el soporte para AndroidX en todo el proyecto (necesario para Compose y bibliotecas modernas)
android.useAndroidX=true

# Convierte de forma automática las dependencias de soporte antiguas (no AndroidX) al equivalente moderno
android.enableJetifier=true

# Optimiza el uso de memoria de la JVM de Gradle para compilaciones más rápidas
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
org.gradle.caching=true
org.gradle.parallel=true
